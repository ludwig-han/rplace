<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r/place @ 상명</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* 닉네임 팝업 */
        #nicknameModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        #nicknameModal .box {
            background: #16213e; padding: 32px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 12px; min-width: 280px;
        }
        #nicknameModal h2 { text-align: center; margin-bottom: 8px; }
        #nicknameInput {
            padding: 10px; border-radius: 6px; border: 1px solid #444;
            background: #0f3460; color: #eee; font-size: 16px;
        }
        #nicknameBtn {
            padding: 10px; border-radius: 6px; border: none;
            background: #e94560; color: white; font-size: 16px; cursor: pointer;
        }

        /* 메인 레이아웃 */
        #main { display: flex; flex: 1; overflow: hidden; }

        /* 캔버스 영역 */
        #canvasArea {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        #canvasWrapper {
            overflow: hidden; cursor: crosshair;
            border: 2px solid #444;
        }
        canvas { display: block; image-rendering: pixelated; }

        /* 줌 버튼 */
        #zoomControls {
            position: absolute; bottom: 16px; left: 16px;
            display: flex; gap: 8px;
        }
        #zoomControls button {
            width: 36px; height: 36px; border-radius: 6px;
            border: none; background: #16213e; color: #eee;
            font-size: 20px; cursor: pointer;
        }

        /* 색상 팔레트 */
        #palette {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; background: #16213e;
            padding: 8px; border-radius: 10px;
        }
        .colorBtn {
            width: 28px; height: 28px; border-radius: 4px;
            border: 2px solid transparent; cursor: pointer;
        }
        .colorBtn.selected { border-color: white; transform: scale(1.2); }

        /* 픽셀 정보 팝업 */
        #pixelInfo {
            display: none; position: absolute; background: #16213e;
            border: 1px solid #444; border-radius: 8px;
            padding: 10px 14px; font-size: 13px; pointer-events: none;
        }

        /* 채팅 */
        #chatArea {
            width: 260px; background: #16213e;
            display: flex; flex-direction: column; border-left: 1px solid #333;
        }
        #chatArea h3 { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; }
        #chatMessages {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 6px; font-size: 13px;
        }
        .chatMsg { background: #0f3460; padding: 6px 10px; border-radius: 6px; word-break: break-all; }
        .chatMsg .sender { color: #e94560; font-weight: bold; font-size: 11px; }
        #chatInputArea { display: flex; padding: 8px; gap: 6px; border-top: 1px solid #333; }
        #chatInput {
            flex: 1; padding: 8px; border-radius: 6px;
            border: 1px solid #444; background: #0f3460; color: #eee; font-size: 13px;
        }
        #chatSendBtn {
            padding: 8px 12px; border-radius: 6px; border: none;
            background: #e94560; color: white; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- 닉네임 팝업 -->
<div id="nicknameModal">
    <div class="box">
        <h2>🎨 r/place @ 상명</h2>
        <p style="text-align:center; font-size:13px; color:#aaa;">닉네임을 입력하고 시작하세요</p>
        <input id="nicknameInput" type="text" placeholder="닉네임 (최대 8자)" maxlength="8">
        <button id="nicknameBtn">시작하기</button>
    </div>
</div>

<!-- 메인 -->
<div id="main">
    <!-- 캔버스 -->
    <div id="canvasArea">
        <div id="canvasWrapper">
            <canvas id="canvas"></canvas>
        </div>
        <div id="zoomControls">
            <button id="zoomIn">+</button>
            <button id="zoomOut">-</button>
        </div>
        <div id="palette"></div>
        <div id="pixelInfo"></div>
    </div>

    <!-- 채팅 -->
    <div id="chatArea">
        <h3>💬 채팅</h3>
        <div id="chatMessages"></div>
        <div id="chatInputArea">
            <input id="chatInput" type="text" placeholder="메시지 입력..." maxlength="100">
            <button id="chatSendBtn">전송</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    // ── 상수 ──
    const COLS = 100, ROWS = 100;
    const COLORS = [
        '#ffffff','#000000','#ff4444','#ff8800','#ffff00',
        '#44ff44','#4444ff','#ff44ff','#44ffff','#884400',
        '#ff88aa','#88ff88','#8888ff','#888888','#ffcc00'
    ];

    // ── 상태 ──
    let nickname = '';
    let token = Math.random().toString(36).slice(2, 9);
    let selectedColor = COLORS[0];
    let zoom = 6; // 픽셀당 px
    let stompClient = null;
    let pixelData = {}; // "x,y" → {color, nickname}

    // ── DOM ──
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const pixelInfo = document.getElementById('pixelInfo');

    // ── 캔버스 초기화 ──
    function initCanvas() {
        canvas.width = COLS * zoom;
        canvas.height = ROWS * zoom;
        drawAll();
    }

    function drawAll() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (const [key, val] of Object.entries(pixelData)) {
            const [x, y] = key.split(',').map(Number);
            drawPixel(x, y, val.color);
        }
        drawGrid();
    }

    function drawPixel(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
    }

    function drawGrid() {
        if (zoom < 4) return;
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= COLS; x++) {
            ctx.beginPath();
            ctx.moveTo(x * zoom, 0);
            ctx.lineTo(x * zoom, ROWS * zoom);
            ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
            ctx.beginPath();
            ctx.moveTo(0, y * zoom);
            ctx.lineTo(COLS * zoom, y * zoom);
            ctx.stroke();
        }
    }

    // ── 팔레트 ──
    const palette = document.getElementById('palette');
    COLORS.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'colorBtn';
        btn.style.background = c;
        if (c === selectedColor) btn.classList.add('selected');
        btn.onclick = () => {
            document.querySelectorAll('.colorBtn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = c;
        };
        palette.appendChild(btn);
    });

    // ── 줌 ──
    document.getElementById('zoomIn').onclick = () => { zoom = Math.min(zoom + 2, 20); initCanvas(); };
    document.getElementById('zoomOut').onclick = () => { zoom = Math.max(zoom - 2, 2); initCanvas(); };

    // ── 캔버스 클릭 ──
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX / zoom);
        const y = Math.floor((e.clientY - rect.top) * scaleY / zoom);

        if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

        // 픽셀 찍기
        stompClient.send('/app/pixel', {}, JSON.stringify({ x, y, color: selectedColor, nickname }));
    });

    // ── 픽셀 호버 (누가 찍었는지) ──
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX / zoom);
        const y = Math.floor((e.clientY - rect.top) * scaleY / zoom);
        const key = `${x},${y}`;
        const data = pixelData[key];

        if (data) {
            pixelInfo.style.display = 'block';
            pixelInfo.style.left = (e.clientX + 12) + 'px';
            pixelInfo.style.top = (e.clientY + 12) + 'px';
            pixelInfo.innerHTML = `<b>${data.nickname}</b><br>${data.color}`;
        } else {
            pixelInfo.style.display = 'none';
        }
    });
    canvas.addEventListener('mouseleave', () => { pixelInfo.style.display = 'none'; });

    // ── WebSocket 연결 ──
    function connect() {
        const socket = new WebSocket(`ws://${location.host}/ws-connect`);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            // 픽셀 구독
            stompClient.subscribe('/topic/pixel', (msg) => {
                const p = JSON.parse(msg.body);
                pixelData[`${p.x},${p.y}`] = { color: p.color, nickname: p.nickname };
                drawPixel(p.x, p.y, p.color);
            });

            // 채팅 구독
            stompClient.subscribe('/topic/room', (msg) => {
                const m = JSON.parse(msg.body);
                appendChat(m.sender, m.content, m.timestamp);
            });

            // 전체 캔버스 로드
            fetch('/api/pixels').then(r => r.json()).then(pixels => {
                pixels.forEach(p => {
                    pixelData[`${p.x},${p.y}`] = { color: p.color, nickname: p.nickname };
                });
                drawAll();
            });

            // 채팅 히스토리 로드
            fetch('/api/chat/history').then(r => r.json()).then(msgs => {
                msgs.forEach(m => appendChat(m.sender, m.content, m.timestamp));
            });
        });
    }

    // ── 채팅 ──
    function appendChat(sender, content, time) {
        const div = document.createElement('div');
        div.className = 'chatMsg';
        div.innerHTML = `<div class="sender">${sender} <span style="color:#666;font-weight:normal">${time}</span></div>${content}`;
        document.getElementById('chatMessages').appendChild(div);
        document.getElementById('chatMessages').scrollTop = 9999;
    }

    document.getElementById('chatSendBtn').onclick = sendChat;
    document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendChat();
    });

    function sendChat() {
        const input = document.getElementById('chatInput');
        const content = input.value.trim();
        if (!content) return;
        stompClient.send('/app/chat', {}, JSON.stringify({ sender: nickname, content, token }));
        input.value = '';
    }

    // ── 닉네임 입력 ──
    document.getElementById('nicknameBtn').onclick = () => {
        const val = document.getElementById('nicknameInput').value.trim();
        if (!val) return;
        nickname = val;
        document.getElementById('nicknameModal').style.display = 'none';
        connect();
        initCanvas();
    };
    document.getElementById('nicknameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('nicknameBtn').click();
    });
</script>
</body>
</html>
